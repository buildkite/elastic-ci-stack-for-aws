  # ============================================================
  # Post-test: service role cleanup, copy, publish, cleanup
  # ============================================================

  - id: "delete-service-role-stack"
    name: ":aws-iam: :cloudformation: Delete"
    command: .buildkite/steps/delete-service-role-stack.sh
    agents:
      queue: "${BUILDKITE_AGENT_META_DATA_QUEUE}"
    if: build.source != "schedule"
    if_changed: *if_changed_deploy_service_role
    depends_on:
      - "delete-windows-amd64"
      - "delete-linux-amd64"
      - "delete-linux-arm64"
      - "delete-ubuntu2404-amd64"
      - "delete-ubuntu2404-arm64"
      - "delete-linux-amd64-cis"
    plugins:
      - *aws_role_plugin

  - id: "copy-ami"
    name: ":cloudformation: 🚚 🌎"
    command:
      - .buildkite/steps/ensure_ami_metadata.py linux amd64
      - .buildkite/steps/ensure_ami_metadata.py linux arm64
      - .buildkite/steps/ensure_ami_metadata.py windows amd64
      - .buildkite/steps/ensure_ami_metadata.py ubuntu2404 amd64
      - .buildkite/steps/ensure_ami_metadata.py ubuntu2404 arm64
      - .buildkite/steps/copy.sh
    agents:
      queue: "${BUILDKITE_AGENT_META_DATA_QUEUE}"
    artifact_paths: "build/mappings.yml"
    if: build.source != "schedule"
    if_changed: *if_changed_deploy_service_role
    depends_on:
      - "test-linux-amd64"
      - "test-linux-arm64"
      - "test-windows-amd64"
      - "test-ubuntu2404-amd64"
      - "test-ubuntu2404-arm64"
    plugins:
      - *aws_role_plugin

  - id: "publish"
    name: ":cloudformation: :rocket:"
    command: .buildkite/steps/publish.sh
    agents:
      queue: "${BUILDKITE_AGENT_META_DATA_QUEUE}"
    concurrency_group: "aws-stack-publish"
    concurrency: 1
    concurrency_method: eager
    artifact_paths: "build/*.yml"
    if: build.source != "schedule"
    if_changed: *if_changed_deploy_service_role
    depends_on: "copy-ami"
    plugins:
      - *aws_role_plugin

  - id: cleanup
    name: ":broom: Cleanup"
    command: .buildkite/steps/cleanup.sh
    agents:
      queue: "${BUILDKITE_AGENT_META_DATA_QUEUE}"
    if: build.source != "schedule"
    if_changed: *if_changed_deploy_service_role
    depends_on: "publish"
    plugins:
      - *aws_role_plugin
